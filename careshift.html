<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CareShift — 보건대병원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
:root{
  --bg:#0a0c14;--s0:#0f1220;--s1:#141826;--s2:#1a2030;--s3:#202840;
  --border:#1e2840;--b2:#273250;
  --text:#ccd6f0;--muted:#4a5f82;--m2:#7090b8;
  --acc:#2e6be6;--acc-d:rgba(46,107,230,.12);
  --grn:#1ab85a;--grn-d:rgba(26,184,90,.11);
  --amb:#d48a0a;--amb-d:rgba(212,138,10,.11);
  --red:#d93535;--red-d:rgba(217,53,53,.1);
  --D-c:#4ade80;--D-bg:rgba(74,222,128,.1);--D-b:rgba(74,222,128,.25);
  --E-c:#fbbf24;--E-bg:rgba(251,191,36,.1);--E-b:rgba(251,191,36,.25);
  --N-c:#a78bfa;--N-bg:rgba(167,139,250,.1);--N-b:rgba(167,139,250,.25);
  --T-c:#60a5fa;--T-bg:rgba(96,165,250,.1);--T-b:rgba(96,165,250,.25);
  --r:5px;--r2:9px;--nav:54px;--safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;overscroll-behavior:none}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── LOGIN ── */
#login{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;
  background:radial-gradient(ellipse at 30% 50%,rgba(46,107,230,.06) 0%,transparent 60%)}
.lcard{width:100%;max-width:380px;background:var(--s0);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.03),0 20px 60px rgba(0,0,0,.6)}
.lhd{padding:28px 26px 20px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,var(--s0),var(--s1))}
.lmark{font-size:9px;font-family:'JetBrains Mono';color:var(--acc);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.ltitle{font-size:26px;font-weight:900;letter-spacing:-2px;line-height:1}
.ltitle em{color:var(--acc);font-style:normal}
.lsub{font-size:12px;color:var(--muted);margin-top:4px}
.lbd{padding:22px 24px}
.fg{margin-bottom:13px}
.fl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px;display:block}
.fi{width:100%;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--s1);color:var(--text);font-family:inherit;font-size:13px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--acc)}
.fi.code{font-family:'JetBrains Mono';font-size:20px;font-weight:600;letter-spacing:4px;text-align:center;text-transform:uppercase}
.fi.pw{font-family:'JetBrains Mono';font-size:18px;letter-spacing:4px;text-align:center}
.fi.code::placeholder,.fi.pw::placeholder{font-size:12px;font-family:'Noto Sans KR';letter-spacing:0;font-weight:400}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--s2);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;transition:all .13s;touch-action:manipulation;white-space:nowrap}
.btn:active{transform:scale(.95);opacity:.8}
.btn.p{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.g{background:var(--grn);border-color:var(--grn);color:#07090f}
.btn.full{width:100%}
.btn.sm{padding:5px 10px;font-size:11.5px}
.btn.ghost{background:transparent;color:var(--muted)}
.lerr{font-size:12px;color:var(--red);padding:8px 10px;background:var(--red-d);border-radius:var(--r);margin-bottom:10px;display:none}
.lerr.on{display:block}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100dvh}
#app.on{display:flex}
@media(min-width:860px){
  #app{flex-direction:row}
  #bot-nav{display:none!important}
  #screens{padding-bottom:8px!important}
}
@media(max-width:859px){#sidebar{display:none}}

#sidebar{width:200px;min-width:200px;background:var(--s0);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100dvh}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sb-logo-m{font-size:8.5px;font-family:'JetBrains Mono';color:var(--acc);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.sb-logo-n{font-size:16px;font-weight:900;letter-spacing:-1px}
.sb-logo-n em{color:var(--acc);font-style:normal}
.sb-info{padding:8px 13px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}
.sb-info strong{color:var(--m2);font-weight:600}
.sb-nav{padding:8px;flex:1;overflow-y:auto}
.sbi{display:flex;align-items:center;gap:7px;padding:8px 9px;border-radius:var(--r);cursor:pointer;color:var(--muted);font-size:12.5px;font-weight:500;transition:all .12s;margin-bottom:1px;user-select:none}
.sbi:hover{background:var(--s2);color:var(--text)}
.sbi.active{background:var(--acc-d);color:var(--acc);font-weight:700}
.sbi-ic{font-size:13px;width:17px;text-align:center}
.sb-foot{padding:8px;border-top:1px solid var(--border)}
.sb-logout{width:100%;padding:7px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:all .12s}
.sb-logout:hover{border-color:var(--red);color:var(--red)}

#topbar{background:var(--s0);border-bottom:1px solid var(--border);padding:9px 13px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:30}
#tb-title{font-size:14px;font-weight:700;flex:1}
.tb-logo{font-size:14px;font-weight:900;letter-spacing:-.5px;display:none}
.tb-logo em{color:var(--acc);font-style:normal}
.mnav{display:flex;align-items:center;gap:4px}
.mb{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:all .12s}
.mb:active{transform:scale(.9)}
.ml{font-family:'JetBrains Mono';font-size:12px;color:var(--muted);min-width:54px;text-align:center}

#screens{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav) + var(--safe) + 6px)}
.screen{display:none;padding:12px}
.screen.on{display:block;animation:sIn .14s ease}
@keyframes sIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

#bot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--s0);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe);z-index:40}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 3px 5px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;transition:color .12s;touch-action:manipulation}
.ntab:active{opacity:.6}
.ntab.active{color:var(--acc)}
.nt-ic{font-size:18px;line-height:1}

/* ── SCHEDULE TABLE ── */
.ward-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:10px;scrollbar-width:none}
.ward-tabs::-webkit-scrollbar{display:none}
.wtab{padding:5px 11px;border-radius:12px;border:1px solid var(--border);background:var(--s0);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .12s;touch-action:manipulation}
.wtab:active{transform:scale(.92)}
.wtab.active{color:#07090f;font-weight:700}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px}
.tbl-wrap::-webkit-scrollbar{height:3px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
table{border-collapse:collapse;min-width:760px;width:100%;border:1px solid var(--border)}
thead th{background:var(--s2);padding:5px 3px;font-size:9.5px;font-weight:700;color:var(--text);text-align:center;border:1px solid var(--border);white-space:nowrap}
thead th.th-team{min-width:50px;background:var(--s3);font-size:11px}
thead th.th-room{min-width:80px;background:var(--s3);font-size:11px}
thead th.th-worker{min-width:60px;background:var(--s3);font-size:11px}
thead th.th-off{min-width:24px;background:var(--s3);font-size:9px;line-height:1.1;writing-mode:vertical-rl}
thead th.sun{color:var(--red)!important;background:#fef0f0!important;background:rgba(217,53,53,.08)!important}
thead th.sat{color:var(--grn)!important;background:rgba(26,184,90,.08)!important}

tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
tbody tr:last-child{border-bottom:none}
tbody tr.tsep>td{border-top:2px solid var(--b2)!important}
tbody tr.jsep>td{border-top:1px dashed var(--b2)!important}
tbody tr.transport-row-first>td{border-top:3px double var(--T-c)!important}

td{padding:3px 2px;text-align:center;vertical-align:middle;border:1px solid rgba(255,255,255,.06)}

/* 팀 셀 (rowspan) */
td.td-team{position:sticky;left:0;z-index:3;background:var(--s2);border-right:2px solid var(--b2);min-width:50px;font-weight:700}
.team-label{font-size:14px;font-weight:900;color:var(--text);writing-mode:horizontal-tb;letter-spacing:-.5px}
td.td-transport{background:var(--T-bg)!important}
td.td-transport .team-label{color:var(--T-c)}

/* 호실 셀 (rowspan) */
td.td-room{position:sticky;left:50px;z-index:2;background:var(--s1);border-right:2px solid var(--b2);min-width:80px;padding:5px 6px;text-align:center}
.room-text{font-size:10px;color:var(--m2);line-height:1.4;font-weight:500;white-space:pre-line}

/* 근무자 셀 */
td.td-worker{position:sticky;left:130px;z-index:1;background:var(--s0);border-right:2px solid var(--b2);min-width:60px;padding:5px 6px;text-align:center}
td.td-worker.leader{background:rgba(212,138,10,.15)!important}
.wname{font-weight:700;font-size:12px;white-space:nowrap}
.wname.leader{color:var(--amb)}

/* 일별 배경 */
.sun-bg{background:rgba(217,53,53,.06)}
.sat-bg{background:rgba(26,184,90,.06)}

.sc{width:24px;height:24px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid transparent;font-family:'JetBrains Mono';position:relative;margin:auto;cursor:pointer;touch-action:manipulation;transition:transform .1s}
.sc:active{transform:scale(1.35);z-index:5}
.sc.D{background:var(--D-bg);color:var(--D-c);border-color:var(--D-b)}
.sc.E{background:var(--E-bg);color:var(--E-c);border-color:var(--E-b)}
.sc.N{background:var(--N-bg);color:var(--N-c);border-color:var(--N-b)}
.sc.DE{background:linear-gradient(135deg,var(--D-bg) 50%,var(--E-bg) 50%);color:var(--D-c);border-color:var(--D-b);font-size:8px}
.sc.EN{background:linear-gradient(135deg,var(--E-bg) 50%,var(--N-bg) 50%);color:var(--E-c);border-color:var(--E-b);font-size:8px}
.sc.D1{background:var(--T-bg);color:var(--T-c);border-color:var(--T-b);font-size:9px}
.sc.OG{background:rgba(251,146,60,.1);color:#fb923c;border-color:rgba(251,146,60,.25);font-size:9px}
.sc.A{background:rgba(163,230,53,.09);color:#86efac;border-color:rgba(163,230,53,.22);font-size:9px}
.sc.E7{background:rgba(253,224,71,.09);color:#fde047;border-color:rgba(253,224,71,.22);font-size:8px}
.sc.OFF{background:transparent;color:var(--muted);border-color:transparent;font-size:11px}
.sc.locked{box-shadow:0 0 0 1.5px var(--acc) inset}

td.td-tail{font-family:'JetBrains Mono';font-size:11px;font-weight:700;padding:3px 5px;background:var(--s1);min-width:24px;color:var(--text)}

/* 근무시간 안내 행 */
tr.sched-info td{background:var(--s2)!important;padding:5px 8px}
tr.sched-info td.info-label{position:sticky;left:0;z-index:3;font-weight:700;font-size:11px;color:var(--text);border-right:2px solid var(--b2);text-align:center}
tr.sched-info td.info-text{font-size:10px;color:var(--m2);text-align:left;line-height:1.6;font-family:'JetBrains Mono'}

.sok{color:var(--grn)}.swarn{color:var(--red)}

/* ── STAT PILLS ── */
.stat-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-bottom:10px;scrollbar-width:none}
.stat-row::-webkit-scrollbar{display:none}
.spill{background:var(--s0);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;flex-shrink:0;min-width:80px}
.spk{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px}
.spv{font-size:20px;font-weight:900;font-family:'JetBrains Mono';letter-spacing:-1px;line-height:1}
.sps{font-size:9px;color:var(--muted);margin-top:2px}
.sp-r .spv{color:var(--red)}.sp-g .spv{color:var(--grn)}.sp-a .spv{color:var(--amb)}

/* ── OVERLAY SHEET ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.ov.on{display:flex}
@media(min-width:600px){.ov{align-items:center}.sheet{border-radius:12px!important;max-height:88vh;margin:16px}}
.sheet{background:var(--s0);border-radius:12px 12px 0 0;width:100%;max-width:500px;padding:0 14px calc(14px + var(--safe));max-height:92dvh;overflow-y:auto;animation:shUp .2s cubic-bezier(.34,1.1,.64,1)}
@keyframes shUp{from{transform:translateY(100%)}to{transform:none}}
.sh-hd{width:28px;height:3px;border-radius:2px;background:var(--s3);margin:8px auto 12px}
.sh-title{font-size:15px;font-weight:700;margin-bottom:12px}
.shift-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.sopt{padding:11px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--s1);cursor:pointer;text-align:center;touch-action:manipulation;transition:transform .1s}
.sopt:active{transform:scale(.95)}
.sopt.D{background:var(--D-bg);border-color:var(--D-b)}
.sopt.E{background:var(--E-bg);border-color:var(--E-b)}
.sopt.N{background:var(--N-bg);border-color:var(--N-b)}
.sopt.T{background:var(--T-bg);border-color:var(--T-b)}
.so-l{font-size:18px;font-weight:700;font-family:'JetBrains Mono';line-height:1}
.so-l.D{color:var(--D-c)}.so-l.E{color:var(--E-c)}.so-l.N{color:var(--N-c)}.so-l.T{color:var(--T-c)}.so-l.OFF{color:var(--muted)}
.so-s{font-size:9.5px;color:var(--muted);margin-top:2px}
.lk-row{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:6px;background:var(--s1);border:1px solid var(--border);margin-bottom:9px}
.lk-row label{flex:1;font-size:12.5px;cursor:pointer}

/* ── SETTINGS ── */
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px}
.rule-card{background:var(--s0);border:1px solid var(--border);border-radius:var(--r2);padding:11px 12px;margin-bottom:7px}
.rc-top{display:flex;align-items:center;gap:9px}
.rc-info{flex:1}
.rc-title{font-weight:700;font-size:13px;margin-bottom:2px}
.rc-desc{font-size:11px;color:var(--muted);line-height:1.4}
.toggle{width:38px;height:21px;border-radius:11px;background:var(--s3);border:1px solid var(--border);position:relative;cursor:pointer;transition:background .17s;flex-shrink:0;touch-action:manipulation}
.toggle.on{background:var(--grn);border-color:var(--grn)}
.toggle::after{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .17s}
.toggle.on::after{left:19px}
.rc-input{display:flex;align-items:center;gap:7px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.rc-lbl{flex:1;font-size:12px;color:var(--muted)}
.step-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:all .1s}
.step-btn:active{transform:scale(.88)}
.rc-val{font-size:15px;font-weight:700;font-family:'JetBrains Mono';min-width:22px;text-align:center;color:var(--acc)}
.srow{display:flex;align-items:center;gap:7px;padding:9px 11px;background:var(--s0);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px}
.srow-l{flex:1;font-size:13px}
.srow-v{font-size:12px;color:var(--muted);font-family:'JetBrains Mono'}
.info-box{font-size:12px;color:var(--m2);padding:9px 11px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;line-height:1.55}
.info-box b{color:var(--text)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--nav) + var(--safe) + 8px);left:50%;transform:translateX(-50%) translateY(50px);background:var(--s0);color:var(--text);border:1px solid var(--border);border-radius:16px;padding:8px 16px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--grn);border-color:var(--grn);color:#07090f}
.toast.warn{background:var(--amb);border-color:var(--amb);color:#07090f}
.toast.err{background:var(--red);border-color:var(--red);color:#fff}
@media(min-width:860px){.toast{bottom:14px}}

/* ── PRINT ── */
@media print{
  body{background:#fff!important;color:#000!important;font-family:'Noto Sans KR',sans-serif}
  #app,#login,#toast,.ov{display:none!important}
  #print-area{display:block!important}
  .p-page{page-break-after:always;padding:8px}
  .p-page:last-child{page-break-after:avoid}
  .p-title{font-size:13px;font-weight:700;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px}
  .p-sub{font-size:11px;color:#444;margin-bottom:10px}
  .p-table{width:100%;border-collapse:collapse;font-size:9px}
  .p-table th,.p-table td{border:1px solid #ccc;padding:3px 2px;text-align:center;vertical-align:middle}
  .p-table th{background:#f0f0f0;font-weight:700}
  .p-table th.p-name,.p-table td.p-name{text-align:left;padding-left:5px;min-width:55px}
  .p-table th.p-sun,.p-table td.p-sun-d{color:#cc0000}
  .p-table th.p-sat,.p-table td.p-sat-d{color:#006600}
  .p-D{background:#e8faf0}.p-E{background:#fffbea}.p-N{background:#f0ecff}
  .p-DE{background:#e8f4ff}.p-EN{background:#f5eeff}
  .p-OFF{color:#aaa;font-size:8px}
  .p-D1{background:#e8f4ff}.p-OG{background:#fff4e8}.p-A{background:#f0ffe8}.p-E7{background:#fffff0}
  .p-leader{background:#fffbf0}
  .p-sum th{background:#e8e8e8;font-size:8px}
  .p-tsep{border-top:2px solid #999!important}
  .p-transport-hd{background:#e8f0ff;font-weight:700;font-size:9px}
  .p-off-count{font-size:8px}
}
#print-area{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="lhd">
      <div class="lmark">◈ schedule system</div>
      <div class="ltitle">Care<em>Shift</em></div>
      <div class="lsub">보건대병원 근무표 관리</div>
    </div>
    <div class="lbd">
      <div class="lerr" id="lerr"></div>
      <div class="fg"><label class="fl">관리자 PIN</label>
        <input class="fi pw" id="l-pin" type="password" placeholder="••••" maxlength="4"
          oninput="this.value=this.value.replace(/[^0-9]/g,'')"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn p full" onclick="doLogin()">로그인</button>

// 토요일 시프트 결정: 5명 중 매주 1명이 A, 다른 1명은 D1, 나머지는 OFF
// 격주 인덱스로 결정 (사람×토요일 인덱스 → A/D1/OFF)
function getSaturdayShift(name, satIdx, namesOrder){
  // satIdx: 0=1번째 토요일, 1=2번째...
  // namesOrder: 그 병동의 D1+A형 인원 순서
  // 룰: 매 토요일에 A 1명, D1 1명 (또는 D1만 1~2명, 62병동은 A 없음)
  // 단순화: satIdx % namesOrder.length 로 누가 A인지 결정
  const idx = namesOrder.indexOf(name);
  if(idx < 0) return null;
  // satIdx마다 A 담당과 D1 담당
  const aIdx = satIdx % namesOrder.length;
  const dIdx = (satIdx + 2) % namesOrder.length;
  if(idx === aIdx) return 'A';
  if(idx === dIdx) return 'D1';
  return 'OFF';
}

const getLocked=(wid,name,day)=>!!(schedule[wid]?.[K(name,day)])?.locked;
function setS(wid,name,day,shift,locked){
  if(!schedule[wid]) schedule[wid]={};
  schedule[wid][K(name,day)]={shift,locked:locked??getLocked(wid,name,day)};

// 월별 다른 직원 구조 반환 (4/5/6월은 WARD_MONTHLY 사용, 그 외는 WARD_TEAMS 기본)
function getWardTeams(wid){
  if(typeof WARD_MONTHLY!=='undefined'){
    // 2026년 4/5/6월: 실제 엑셀 데이터
    if(year===2026 && (month===4||month===5||month===6)){
      const ym = WARD_MONTHLY[wid]?.[String(month)];
      if(ym) return ym;
    }
    // 2026년 7월 이후 또는 2027년+: 6월 기준으로 로테이션 예측
    let n = 0;
    if(year===2026 && month>=7) n = month - 6;
    else if(year>=2027) n = (year-2026)*12 + month - 6;
    if(n>0){
      return predictRotation(wid, n);
    }
  }
  return WARD_TEAMS[wid];
}

// N개월 후 직원 배치 예측 (로테이션 패턴 적용)
function predictRotation(wid, n){
  let cur = JSON.parse(JSON.stringify(WARD_MONTHLY[wid]['6']));
  for(let i=0; i<n; i++){
    cur = applyRotation(wid, cur);
  }
  return cur;
}

// 한 달 로테이션 적용
function applyRotation(wid, prev){
  const teams = JSON.parse(JSON.stringify(prev.teams));

  if(wid==='62'){
    // 62병동: 1팀(6) ↔ 2팀(6) 교환 (팀장 김정애=2팀 0번 고정)
    const t1 = teams[0].jo[0].members;
    const t2 = teams[1].jo[0].members;
    const moveTo2 = t1[0];        // 1팀 0번 → 2팀 끝
    const moveTo1 = t2[1];        // 2팀 1번 → 1팀 끝
    teams[0].jo[0].members = [...t1.slice(1), moveTo1];
    teams[1].jo[0].members = [t2[0], ...t2.slice(2), moveTo2];
  }
  else if(wid==='72' || wid==='82'){
    // 72/82병동: 6개 조 회전 체인 (1팀1조→1팀2조→2팀1조→...→3팀2조→1팀1조)
    const allJoGroups = [];
    teams.forEach((t,ti)=>t.jo.forEach((j,ji)=>allJoGroups.push({ti,ji,members:[...j.members]})));

    const outgoing = [];
    const fixedIdx = [];

    allJoGroups.forEach(g=>{
      const fixed = g.members.findIndex(m=>typeof LEADERS!=='undefined'&&LEADERS.has(m));
      fixedIdx.push(fixed);
      if(fixed===0) outgoing.push(g.members[1]);
      else if(fixed===2) outgoing.push(g.members[0]);
      else outgoing.push(g.members[0]);
    });

    allJoGroups.forEach((g,idx)=>{
      const incoming = outgoing[(idx + 1) % allJoGroups.length];
      const fixed = fixedIdx[idx];
      const m = [...g.members];
      if(fixed===0) g.newMembers = [m[0], m[2], incoming];
      else if(fixed===2) g.newMembers = [m[1], incoming, m[2]];
      else g.newMembers = [m[1], m[2], incoming];
    });

    allJoGroups.forEach(g=>{
      teams[g.ti].jo[g.ji].members = g.newMembers;
    });
  }
  else if(wid==='92'){
    // 92병동: 1팀→2팀→3팀 회전, 매월 2명씩 이동
    // 팀장: 김선순(1팀 0번), 김성희(3팀 5번) 고정
    const t1 = teams[0].jo[0].members;
    const t2 = teams[1].jo[0].members;
    const t3 = teams[2].jo[0].members;
    teams[0].jo[0].members = [t1[0], t1[3], t1[4], t1[5], t2[0], t2[1]];
    teams[1].jo[0].members = [t2[2], t2[3], t2[4], t2[5], t3[0], t3[1]];
    teams[2].jo[0].members = [t3[2], t3[3], t3[4], t1[1], t1[2], t3[5]];
  }

  return {teams, transport: prev.transport};
}

function getAllMembers(wid){
  const wt=getWardTeams(wid);
  const care=[], transport=wt.transport||[];
  wt.teams.forEach(t=>t.jo.forEach(j=>j.members.forEach(n=>care.push(n))));
  return {care, transport};
}

function saveData(){
  // 4/5/6월은 절대 schedule 저장 안 함 (원본 보호)
  if(!isHistoricalMonth()){
    const key=`cs2_sched_${year}_${month}`;
    localStorage.setItem(key, JSON.stringify(schedule));
  }
  localStorage.setItem('cs2_prereqs', JSON.stringify({preReqs,preReqId}));
  localStorage.setItem('cs2_rules', JSON.stringify(rules));
}
function isHistoricalMonth(){
  return year===2026 && (month===4||month===5||month===6);
}

function loadData(){
  const key=`cs2_sched_${year}_${month}`;

  // ⭐ 2026년 4/5/6월은 항상 HIST_DATA에서 강제 로드 (덮어쓰기 절대 금지)
  if(isHistoricalMonth() && typeof HIST_DATA!=='undefined'){
    schedule = {};
    const histKey = `2026_${month}`;
    WARDS.forEach(w=>{
      const wardHist = HIST_DATA[w.id]?.[histKey];
      if(wardHist){
        // 깊은 복사 + 모든 셀을 locked로 설정 (수정 불가)
        schedule[w.id] = {};
        Object.entries(wardHist).forEach(([k,v])=>{
          schedule[w.id][k] = {shift: v.shift, locked: true};
        });
      } else {
        schedule[w.id] = {};
      }
    });
    // 빈 셀 채우기 (직원만 있고 데이터 없는 경우 — OFF로)
    const days=dim(year,month);
    WARDS.forEach(w=>{
      if(!schedule[w.id]) schedule[w.id]={};
      const {care,transport}=getAllMembers(w.id);
      [...care,...transport].forEach(name=>{
        for(let d=1;d<=days;d++){
          if(!schedule[w.id][K(name,d)])
            schedule[w.id][K(name,d)]={shift:'OFF',locked:true};
        }
      });
    });
    // 규칙/사전희망은 정상 로드
    const pr=localStorage.getItem('cs2_prereqs');
    if(pr){const d=JSON.parse(pr);preReqs=d.preReqs||[];preReqId=d.preReqId||1;}
    const rl=localStorage.getItem('cs2_rules');
    if(rl){const d=JSON.parse(rl);Object.keys(d).forEach(k=>{if(rules[k])rules[k]=d[k];});}
    return;
  }

  // 일반 월: localStorage에서 로드
  const raw=localStorage.getItem(key);
  schedule=raw?JSON.parse(raw):{};

  const pr=localStorage.getItem('cs2_prereqs');
  if(pr){const d=JSON.parse(pr);preReqs=d.preReqs||[];preReqId=d.preReqId||1;}
  const rl=localStorage.getItem('cs2_rules');
  if(rl){const d=JSON.parse(rl);Object.keys(d).forEach(k=>{if(rules[k])rules[k]=d[k];});}

  // 빈 셀 초기화
  const days=dim(year,month);
  WARDS.forEach(w=>{
    if(!schedule[w.id]) schedule[w.id]={};
    const {care,transport}=getAllMembers(w.id);
    [...care,...transport].forEach(name=>{
      for(let d=1;d<=days;d++){if(!schedule[w.id][K(name,d)])schedule[w.id][K(name,d)]={shift:'OFF',locked:false};}
    });
  });
}

  errEl.classList.remove('on');

  else if(saved!==hashPw(pin)){errEl.textContent='PIN이 틀렸습니다';errEl.classList.add('on');return;}

  // ⭐ 이전 버전에서 망가진 4/5/6월 localStorage 데이터 정리

  document.getElementById('ml').textContent=`${year}.${String(month).padStart(2,'0')}`;
  loadData();
  checkMobile();
  nav('schedule');
}
function hashPw(pw){let h=5381;for(let i=0;i<pw.length;i++)h=(h*33^pw.charCodeAt(i))>>>0;return h.toString(36);}

    div.innerHTML=`📂 <b>2026년 ${month}월 — 실제 근무표 (읽기 전용)</b> · 엑셀 원본 데이터입니다. 수정/자동배정 불가. <button onclick="goCurrentMonth()" style="margin-left:auto;padding:4px 10px;border-radius:5px;border:1px solid var(--amb);background:transparent;color:var(--amb);cursor:pointer;font-size:11px;font-family:inherit;font-weight:700">현재 월로 →</button>`;
    const screen=document.getElementById('screen-schedule');
    screen.insertBefore(div, screen.firstChild);
  }
}

function goCurrentMonth(){
  const now=new Date();
  const dy=now.getFullYear()-year;
  const dm=(now.getMonth()+1)-month;
  const totalDiff=dy*12+dm;
  if(totalDiff!==0){
    saveData();
    year=now.getFullYear();month=now.getMonth()+1;
    document.getElementById('ml').textContent=`${year}.${String(month).padStart(2,'0')}`;
    loadData();
    renderSchedule();
  }
}

function openShift(wid,name,day,isTransport){
  shiftTarget={wid,name,day,isTransport};
  const dw=DOW(year,month,day);
  document.getElementById('shift-title').textContent=`${name} · ${month}/${day}일 (${DAYS_KR[dw]})`;
  document.getElementById('lock-cb').checked=getLocked(wid,name,day);
  const cur=getS(wid,name,day);
  const prq=preReqs.find(p=>p.wardId===wid&&p.name===name&&p.day===day&&p.year===year&&p.month===month);

  let opts='';
  if(isTransport){
    [['D1','D1',SHIFT_TIME.D1,'T'],['OG','OG',SHIFT_TIME.OG,'T'],['A','A',SHIFT_TIME.A,'T'],['E7','E7',SHIFT_TIME.E7,'T']].forEach(([v,l,t,c])=>{
      opts+=`<div class="sopt T" onclick="applyShift('${v}')"><div class="so-l T">${l}</div><div class="so-s">${t}</div></div>`;
    });
  } else {
    [['D','D',SHIFT_TIME.D,'D'],['E','E',SHIFT_TIME.E,'E'],['N','N',SHIFT_TIME.N,'N'],
     ['DE','DE',SHIFT_TIME.DE,'D'],['EN','EN',SHIFT_TIME.EN,'E']].forEach(([v,l,t,c])=>{
      const warn=v==='D'&&day>1&&getS(wid,name,day-1)==='N'?'⚠️N다음D':'';
      opts+=`<div class="sopt ${c}" onclick="applyShift('${v}')"><div class="so-l ${c}">${l}</div><div class="so-s">${t}${warn?'<br><span style="color:var(--red);font-size:9px">'+warn+'</span>':''}</div></div>`;
    });
  }
  opts+=`<div class="sopt" onclick="applyShift('OFF')"><div class="so-l OFF">휴</div><div class="so-s">휴무</div></div>`;
  if(prq) opts+=`<div style="font-size:11px;color:var(--acc);padding:6px 0;grid-column:1/-1">📌 사전희망: ${prq.shift}${prq.memo?' ('+prq.memo+')':''}</div>`;

  document.getElementById('shift-grid').innerHTML=opts;
  openOv('ov-shift');
}

function applyShift(s){
  if(!shiftTarget)return;
  // 4/5/6월은 수정 불가
  if(isHistoricalMonth()){
    closeOv('ov-shift');
    toast('과거 기록은 수정할 수 없습니다','warn');
    return;
  }
  const{wid,name,day}=shiftTarget;
  setS(wid,name,day,s,document.getElementById('lock-cb').checked);
  closeOv('ov-shift');
  renderSchedule();
  schedSave();
  toast(s==='OFF'?'휴무 배정':`${s} 배정`,'ok');
}

function autoWard(wid,days){
  const wt=getWardTeams(wid);
  const maxN=rules.max_night.on?rules.max_night.val:99;
  const maxCN=rules.consec_night.on?rules.consec_night.val:2;
  const maxCW=rules.max_consec_work.on?rules.max_consec_work.val:5;  // 최대 연속 근무일

  // 헬퍼: 특정 직원이 day에 시프트 추가하면 연속근무가 maxCW 초과하는지 체크
  // 즉 day 앞뒤 OFF 사이 근무 길이가 maxCW 초과인지
  function wouldExceedConsec(n, day){
    // day에 근무가 들어간다고 가정. day 앞으로 OFF 만날 때까지, 뒤로 OFF 만날 때까지 셈
    let before=0;
    for(let d=day-1; d>=1; d--){
      if(getS(wid,n,d)==='OFF') break;
      before++;
    }
    let after=0;
    for(let d=day+1; d<=days; d++){
      if(getS(wid,n,d)==='OFF') break;
      after++;
    }
    return (before + 1 + after) > maxCW;
  }

  // 전체 직원
  const allCare=[];
  wt.teams.forEach(t=>t.jo.forEach(j=>j.members.forEach(n=>allCare.push(n))));
  const allTransport=wt.transport||[];
  const allMembers=[...allCare,...allTransport];

  // 조별 그룹화
  const joGroups=[];
  wt.teams.forEach(t=>t.jo.forEach(j=>joGroups.push({team:t.team,jo:j.jo,members:j.members.slice()})));

  // ── 사전 희망 먼저 locked 적용 ──
  preReqs.filter(p=>p.wardId===wid&&p.year===year&&p.month===month).forEach(p=>{
    setS(wid,p.name,p.day,p.shift,true);
  });

  // ── 전부 OFF 초기화 (locked 제외) ──
  for(let d=1;d<=days;d++) allMembers.forEach(n=>{
    if(!getLocked(wid,n,d)) setS(wid,n,d,'OFF',false);
  });

  // 카운터
  const cnt={};
  allCare.forEach(n=>{cnt[n]={D:0,E:0,N:0,DE:0,EN:0,OFF:0,total:0};});

  // locked 셀 카운트
  for(let d=1;d<=days;d++) allCare.forEach(n=>{
    if(!getLocked(wid,n,d)) return;
    const s=getS(wid,n,d);
    if(s==='OFF') cnt[n].OFF++;
    else {cnt[n][s]=(cnt[n][s]||0)+1; cnt[n].total++;}
  });

  const isLeader=n=>LEADERS.has(n);
  const regulars=allCare.filter(n=>!isLeader(n));
  const leaders=allCare.filter(n=>isLeader(n));

  // ── 개인별 월 목표 (실제 데이터 기반) ──
  // 일반: D=7, E=7, N=2-3, DE=3, EN=3, OFF=8 (총 22-23일)
  // 팀장: D=11-12, E=7-8, N=0, DE=4, EN=0, OFF=7
  const targetN_normal = Math.min(3, maxN);
  const targetDE = 3;
  const targetEN = 3;
  const targetOFF_N = rules.off_normal.on?rules.off_normal.val:8;
  const targetOFF_L = rules.off_leader.on?rules.off_leader.val:7;

  // 조별 일별 쿼터 (3명 조 기준)
  // 같은 날 한 조에서: D 또는 DE 중 1명, E 또는 EN 중 1명, OFF 1명 ± (변동)
  // 또는 N 1명일 수도 있음 (조에 따라 돌아가며)

  // ── PASS 1: EN/N 다음날 강제 OFF ──
  for(let pass=0;pass<2;pass++)
  for(let d=2;d<=days;d++) allCare.forEach(n=>{
    if(getLocked(wid,n,d))return;
    const prev=getS(wid,n,d-1);
    if(prev==='EN'||prev==='N'){
      if(getS(wid,n,d)!=='OFF'){setS(wid,n,d,'OFF',false);cnt[n].OFF++;}
    }
  });

  // ── PASS 1.5: 주말(일요일) OFF 우선 배정 ──
  // 실제 데이터 분석: 일요일 OFF 비율 45%+, 토요일 30%+
  // 각 직원에게 한 달에 최소 1번 일요일 OFF 보장 (가능한 균등)
  const sundays = Array.from({length:days},(_,i)=>i+1).filter(d=>DOW(year,month,d)===0);
  const saturdays = Array.from({length:days},(_,i)=>i+1).filter(d=>DOW(year,month,d)===6);

  // 일요일별 OFF 인원 목표 (간병 인원의 45%)
  const sunOffTarget = Math.round(regulars.length * 0.45);
  sundays.forEach(d=>{
    let sunOffCnt = regulars.filter(n=>getS(wid,n,d)==='OFF'&&!getLocked(wid,n,d)).length;
    if(sunOffCnt>=sunOffTarget) return;
    // 사전 희망 잠긴 사람 제외
    const cands = regulars.filter(n=>!getLocked(wid,n,d)&&getS(wid,n,d)==='OFF')
      .sort((a,b)=>{
        // 이번 달 이미 잡힌 일요일 OFF 수가 적은 사람 우선
        const aSunOff = sundays.filter(s=>getS(wid,a,s)==='OFF').length;
        const bSunOff = sundays.filter(s=>getS(wid,b,s)==='OFF').length;
        return aSunOff - bSunOff;
      });
    // 이미 OFF 상태인 셀이 대부분이므로 그대로 두면 됨 (전체 초기화가 OFF이므로)
  });

  // ── PASS 2: 날짜 우선, 시프트 우선 배정 ──
  // 핵심 전략:
  //   1) 하루씩 순회하면서 그날의 D/E/N/DE/EN 쿼터를 채움
  //   2) 조별로 균등하게 배정 (한 조에서 같은 시프트 몰리지 않게)
  //   3) 개인별 월 목표 횟수와 비교해서 부족한 사람부터 우선

  const qN  = wid==='62'?2:3;  // 하루 N 쿼터
  const qD  = wid==='62'?4:6;
  const qE  = wid==='62'?4:6;

  // 일요일은 쿼터를 줄임 (실제 데이터: 일요일 근무 인원 적음)
  function dayQuota(day, sh){
    const dw=DOW(year,month,day);
    const base=sh==='N'?qN:(sh==='D'?qD:qE);
    if(dw===0) return Math.max(1, Math.round(base*0.55)); // 일요일: 55%
    if(dw===6) return Math.max(1, Math.round(base*0.7));  // 토요일: 70%
    return base; // 평일: 100%
  }

  // 헬퍼: 조별 그날 시프트 카운트
  function joShiftCount(joIdx, day, shift){
    return joGroups[joIdx].members.filter(n=>getS(wid,n,day)===shift).length;
  }
  function memberJoIdx(name){
    return joGroups.findIndex(g=>g.members.includes(name));
  }

  // ── PASS 3: N 배정 (조별 균등, 개인 목표 고려) ──
  for(let d=1;d<=days;d++){
    let filledN=regulars.filter(n=>getS(wid,n,d)==='N').length;
    if(filledN>=dayQuota(d,'N')) continue;

    // 후보: 일반 직원 중 OFF 상태, N 횟수 부족한 순
    const cands=regulars.filter(n=>!getLocked(wid,n,d)&&getS(wid,n,d)==='OFF')
      .sort((a,b)=>{
        // 우선순위: 조별 N분배 → 개인 N 부족 → 총 근무 부족
        const joA=memberJoIdx(a), joB=memberJoIdx(b);
        const joNa=joGroups[joA].members.reduce((s,m)=>s+(cnt[m]?.N||0),0);
        const joNb=joGroups[joB].members.reduce((s,m)=>s+(cnt[m]?.N||0),0);
        if(joNa!==joNb) return joNa-joNb;
        return (cnt[a].N||0)-(cnt[b].N||0);
      });
    
    for(const n of cands){
      if(filledN>=qN) break;
      // 같은 조에 이미 N 있으면 스킵 (조별 균등)
      const joIdx=memberJoIdx(n);
      if(joShiftCount(joIdx,d,'N')>=1 && joShiftCount(joIdx,d,'EN')>=0) {
        // 같은 조에 N 2명까지는 허용하지 않음 (3명짜리 조라)
        const sameJoNN = joGroups[joIdx].members.filter(m=>getS(wid,m,d)==='N'||getS(wid,m,d)==='EN').length;
        if(sameJoNN >= 1) continue;
      }
      // 월 N 한도 체크
      const lim=Math.min(maxN, targetN_normal+1);
      if((cnt[n].N||0)>=lim) continue;
      // 연속 N 체크
      let consec=0;for(let dd=d-1;dd>=1&&getS(wid,n,dd)==='N';dd--) consec++;
      if(consec>=maxCN) continue;
      // ⭐ 연속 근무 체크
      if(wouldExceedConsec(n,d)) continue;
      // 다음날 OFF 가능 체크
      if(d<days&&getLocked(wid,n,d+1)&&getS(wid,n,d+1)!=='OFF') continue;
      
      setS(wid,n,d,'N',false);
      cnt[n].N++; cnt[n].total++;
      if(cnt[n].OFF>0) cnt[n].OFF--;
      filledN++;
      
      // 다음날 강제 OFF
      if(d<days&&!getLocked(wid,n,d+1)){
        setS(wid,n,d+1,'OFF',false);
        cnt[n].OFF++;
      }
    }
  }

  // ── PASS 4: EN 배정 (N과 동수 페어, 조별 균등) ──
  for(let d=1;d<=days;d++){
    const nToday=regulars.filter(n=>getS(wid,n,d)==='N').length;
    let filledEN=regulars.filter(n=>getS(wid,n,d)==='EN').length;
    if(filledEN>=nToday) continue;
    
    const cands=regulars.filter(n=>!getLocked(wid,n,d)&&getS(wid,n,d)==='OFF'
      &&(cnt[n].EN||0)<targetEN)
      .sort((a,b)=>{
        const joA=memberJoIdx(a), joB=memberJoIdx(b);
        const joENa=joGroups[joA].members.reduce((s,m)=>s+(cnt[m]?.EN||0),0);
        const joENb=joGroups[joB].members.reduce((s,m)=>s+(cnt[m]?.EN||0),0);
        if(joENa!==joENb) return joENa-joENb;
        return (cnt[a].EN||0)-(cnt[b].EN||0);
      });
    
    for(const n of cands){
      if(filledEN>=nToday) break;
      // 전날 N/EN이면 안 됨
      const prev=d>1?getS(wid,n,d-1):'';
      if(prev==='N'||prev==='EN') continue;
      // 같은 조 N/EN 합 체크
      const joIdx=memberJoIdx(n);
      const sameJoNN = joGroups[joIdx].members.filter(m=>getS(wid,m,d)==='N'||getS(wid,m,d)==='EN').length;
      if(sameJoNN >= 2) continue;
      // 최근 5일 DE/EN 너무 가까우면 스킵
      let tooClose=false;
      for(let dd=Math.max(1,d-4);dd<d;dd++){
        const ss=getS(wid,n,dd);
        if(ss==='DE'||ss==='EN'){tooClose=true; break;}
      }
      if(tooClose) continue;
      // ⭐ 연속 근무 체크
      if(wouldExceedConsec(n,d)) continue;
      // 다음날 OFF 가능
      if(d<days&&getLocked(wid,n,d+1)&&getS(wid,n,d+1)!=='OFF') continue;
      
      setS(wid,n,d,'EN',false);
      cnt[n].EN++; cnt[n].total++;
      if(cnt[n].OFF>0) cnt[n].OFF--;
      filledEN++;
      
      if(d<days&&!getLocked(wid,n,d+1)){
        setS(wid,n,d+1,'OFF',false);
        cnt[n].OFF++;
      }
    }
  }

  // ── PASS 5: DE 배정 (EN과 동수, 팀장도 포함) ──
  for(let d=1;d<=days;d++){
    const enToday=regulars.filter(n=>getS(wid,n,d)==='EN').length;
    let filledDE=allCare.filter(n=>getS(wid,n,d)==='DE').length;
    
    // DE는 EN 동수 + 팀장 1명 더 가능 (실제 데이터에서 팀장 DE 4회/월)
    const targetDEToday = enToday + (leaders.length>0?1:0);
    if(filledDE>=targetDEToday) continue;
    
    // 팀장 우선 (월 DE 4회 채우기)
    const candLeaders=leaders.filter(n=>!getLocked(wid,n,d)&&getS(wid,n,d)==='OFF'&&(cnt[n].DE||0)<4)
      .sort((a,b)=>(cnt[a].DE||0)-(cnt[b].DE||0));
    
    for(const n of candLeaders){
      if(filledDE>=targetDEToday) break;
      const prev=d>1?getS(wid,n,d-1):'';
      if(prev==='N'||prev==='EN') continue;
      let tooClose=false;
      for(let dd=Math.max(1,d-4);dd<d;dd++){
        const ss=getS(wid,n,dd);
        if(ss==='DE'){tooClose=true; break;}
      }
      if(tooClose) continue;
      if(wouldExceedConsec(n,d)) continue;
      setS(wid,n,d,'DE',false);
      cnt[n].DE++; cnt[n].total++;
      if(cnt[n].OFF>0) cnt[n].OFF--;
      filledDE++;
    }
    
    // 일반 직원 DE
    const cands=regulars.filter(n=>!getLocked(wid,n,d)&&getS(wid,n,d)==='OFF'&&(cnt[n].DE||0)<targetDE)
      .sort((a,b)=>{
        const joA=memberJoIdx(a), joB=memberJoIdx(b);
        const joDEa=joGroups[joA].members.reduce((s,m)=>s+(cnt[m]?.DE||0),0);
        const joDEb=joGroups[joB].members.reduce((s,m)=>s+(cnt[m]?.DE||0),0);
        if(joDEa!==joDEb) return joDEa-joDEb;
        return (cnt[a].DE||0)-(cnt[b].DE||0);
      });
    
    for(const n of cands){
      if(filledDE>=targetDEToday) break;
      const prev=d>1?getS(wid,n,d-1):'';
      if(prev==='N'||prev==='EN') continue;
      let tooClose=false;
      for(let dd=Math.max(1,d-4);dd<d;dd++){
        const ss=getS(wid,n,dd);
        if(ss==='DE'||ss==='EN'){tooClose=true; break;}
      }
      if(tooClose) continue;
      if(wouldExceedConsec(n,d)) continue;
      setS(wid,n,d,'DE',false);
      cnt[n].DE++; cnt[n].total++;
      if(cnt[n].OFF>0) cnt[n].OFF--;
      filledDE++;
    }
  }

  // ── PASS 6: D, E 쿼터 채우기 (조별 균등) ──
  for(let d=1;d<=days;d++){
    for(const sh of['D','E']){
      const quota=dayQuota(d, sh);
      let filled=allCare.filter(n=>{
        const s=getS(wid,n,d);
        return sh==='D'?(s==='D'||s==='DE'):(s==='E'||s==='DE'||s==='EN');
      }).length;
      if(filled>=quota) continue;
      
      const cands=allCare.filter(n=>!getLocked(wid,n,d)&&getS(wid,n,d)==='OFF')
        .sort((a,b)=>{
          // 팀장은 D 우선, E는 나중
          if(sh==='D'){
            if(isLeader(a)&&!isLeader(b)) return -1;
            if(!isLeader(a)&&isLeader(b)) return 1;
          }
          const joA=memberJoIdx(a), joB=memberJoIdx(b);
          if(joA>=0&&joB>=0){
            const joSa=joGroups[joA].members.reduce((s,m)=>s+(cnt[m]?.[sh]||0),0);
            const joSb=joGroups[joB].members.reduce((s,m)=>s+(cnt[m]?.[sh]||0),0);
            if(joSa!==joSb) return joSa-joSb;
          }
          return (cnt[a][sh]||0)-(cnt[b][sh]||0);
        });
      
      for(const n of cands){
        if(filled>=quota) break;
        // N/EN 다음날 D 금지
        const prev=d>1?getS(wid,n,d-1):'';
        if((prev==='N'||prev==='EN')&&sh==='D') continue;
        // 같은 조 중복 방지: 같은 조에 이미 같은 시프트 2명이면 스킵
        const joIdx=memberJoIdx(n);
        if(joIdx>=0){
          const sameJoCnt=joGroups[joIdx].members.filter(m=>{
            const ss=getS(wid,m,d);
            return sh==='D'?(ss==='D'||ss==='DE'):(ss==='E'||ss==='DE'||ss==='EN');
          }).length;
          if(sameJoCnt>=2) continue;
        }
        // ⭐ 연속 근무 체크
        if(wouldExceedConsec(n,d)) continue;
        setS(wid,n,d,sh,false);
        cnt[n][sh]=(cnt[n][sh]||0)+1; cnt[n].total++;
        if(cnt[n].OFF>0) cnt[n].OFF--;
        filled++;
      }
    }
  }

  // ── PASS 7: 연속 근무 5일 초과 → OFF 삽입 ──
  // 실제 데이터: 최대 5일 연속까지, 평균 3~4일
  allCare.forEach(n=>{
    let consec=0;
    for(let d=1;d<=days;d++){
      const s=getS(wid,n,d);
      if(s==='OFF'){consec=0;continue;}
      consec++;
      if(consec>maxCW){
        if(!getLocked(wid,n,d)){
          setS(wid,n,d,'OFF',false);
          consec=0;
        }
      }
    }
  });

  // ── PASS 7.5: EN/N 다음날 OFF 강제 (먼저 실행 → OFF가 8 초과해도 PASS 8에서 줄임) ──
  for(let d=2;d<=days;d++){
    allCare.forEach(n=>{
      const prev = getS(wid,n,d-1);
      if((prev === 'N' || prev === 'EN') && getS(wid,n,d) !== 'OFF' && !getLocked(wid,n,d)){
        const cur = getS(wid,n,d);
        setS(wid,n,d,'OFF',false);
        if(cnt[n] && cnt[n][cur]) cnt[n][cur]--;
      }
    });
  }

  // ── PASS 8: OFF 수를 정확히 목표값으로 조정 (최종 단계) ──
  // 일반: 8일, 팀장: 7일
  // ⭐ EN/N 다음날 OFF는 절대 건드리지 않음 (규칙 1 보호)
  function isAfterENN(name, d){
    if(d <= 1) return false;
    const prev = getS(wid, name, d-1);
    return prev === 'N' || prev === 'EN';
  }

  allCare.forEach(n=>{
    const target = isLeader(n) ? targetOFF_L : targetOFF_N;
    const curOFF = Array.from({length:days},(_,i)=>getS(wid,n,i+1)==='OFF'?1:0).reduce((a,b)=>a+b,0);
    let diff = target - curOFF;

    if(diff > 0){
      // OFF 부족 → 추가 (1순위 일요일, 2순위 토요일, 3순위 평일)
      sundays.forEach(d=>{
        if(diff<=0||getLocked(wid,n,d)||getS(wid,n,d)==='OFF')return;
        setS(wid,n,d,'OFF',false); diff--;
      });
      saturdays.forEach(d=>{
        if(diff<=0||getLocked(wid,n,d)||getS(wid,n,d)==='OFF')return;
        setS(wid,n,d,'OFF',false); diff--;
      });
      for(let d=2;d<=days-1&&diff>0;d++){
        if(getLocked(wid,n,d)||getS(wid,n,d)==='OFF') continue;
        const prev=getS(wid,n,d-1),next=getS(wid,n,d+1);
        if(prev!=='OFF'&&next!=='OFF'){
          setS(wid,n,d,'OFF',false); diff--;
        }
      }
    } else if(diff < 0){
      // OFF 초과 → D/E로 변경
      // ⭐ EN/N 다음날 OFF는 변경 금지
      const canChange = (d)=>{
        if(getLocked(wid,n,d)||getS(wid,n,d)!=='OFF') return false;
        if(isAfterENN(n, d)) return false;
        return true;
      };
      const tryChange = (d)=>{
        // 다음날 N/EN인지 체크 (그러면 D는 안 됨)
        const next = d<days ? getS(wid,n,d+1) : '';
        let sh;
        if(next === 'N' || next === 'EN'){
          // 다음날 나이트면 오늘은 D 또는 E (둘 다 OK)
          sh = (cnt[n].D||0) <= (cnt[n].E||0) ? 'D' : 'E';
        } else {
          sh = (cnt[n].D||0) <= (cnt[n].E||0) ? 'D' : 'E';
        }
        setS(wid,n,d,sh,false);
        cnt[n][sh]=(cnt[n][sh]||0)+1;
        diff++;
      };

      // 1순위: 평일
      for(let d=1;d<=days&&diff<0;d++){
        const dw=DOW(year,month,d);
        if(dw===0||dw===6) continue;
        if(!canChange(d)) continue;
        tryChange(d);
      }
      // 2순위: 토요일
      for(let d=1;d<=days&&diff<0;d++){
        const dw=DOW(year,month,d);
        if(dw!==6) continue;
        if(!canChange(d)) continue;
        tryChange(d);
      }
      // 3순위: 일요일 (최후 수단)
      for(let d=1;d<=days&&diff<0;d++){
        const dw=DOW(year,month,d);
        if(dw!==0) continue;
        if(!canChange(d)) continue;
        tryChange(d);
      }
    }
  });

  // ── PASS 9: 최종 검증 - 모든 규칙 만족 확인 ──
  // 1) EN/N 다음날 OFF 위반 마지막 강제 보정
  // 2) OFF 개수 재확인 (목표값 일치 보장)
  for(let d=2;d<=days;d++){
    allCare.forEach(n=>{
      const prev = getS(wid,n,d-1);
      if((prev === 'N' || prev === 'EN') && getS(wid,n,d) !== 'OFF' && !getLocked(wid,n,d)){
        const cur = getS(wid,n,d);
        setS(wid,n,d,'OFF',false);
        if(cnt[n] && cnt[n][cur]) cnt[n][cur]--;
      }
    });
  }

  // 이송요원 배정
  autoTransport(wid,days);
}

function autoTransport(wid,days){
  const transport=getWardTeams(wid).transport||[];
  const saturdays=Array.from({length:days},(_,i)=>i+1).filter(d=>DOW(year,month,d)===6);

  // 사전 희망 잠금
  preReqs.filter(p=>p.wardId===wid&&p.year===year&&p.month===month&&transport.includes(p.name))
    .forEach(p=>setS(wid,p.name,p.day,p.shift,true));

  // 전체 OFF 초기화
  transport.forEach(n=>{for(let d=1;d<=days;d++){if(!getLocked(wid,n,d))setS(wid,n,d,'OFF',false);}});

  // 패턴 결정 (4/5/6월은 정확한 패턴, 그 외는 6월 기준 + 회전)
  let wkPattern, satPattern;
  const pat = TRANSPORT_PATTERN[wid];
  if(pat){
    if(year===2026 && month>=4 && month<=6){
      wkPattern = pat.weekday[month];
    } else {
      // 7월 이후: 6월 기준으로 매월 시프트 (D1+A형만)
      wkPattern = JSON.parse(JSON.stringify(pat.weekday[6]));
      const shift = (year-2026)*12 + month - 6;
      Object.keys(wkPattern).forEach(name=>{
        const p = wkPattern[name];
        if(p.aDay !== undefined){
          // 매월 +1 회전 (월=1, 화=2, ..., 금=5)
          p.aDay = ((p.aDay - 1 + shift) % 5) + 1;
        }
        // e7Day는 고정 (인원 변경 없음)
      });
    }
    satPattern = pat.saturday;
  }

  // ─── 주중(월~금) 배정 ───
  transport.forEach(n=>{
    const p = wkPattern?.[n];
    if(!p) return;
    for(let d=1;d<=days;d++){
      if(getLocked(wid,n,d)) continue;
      const dw=DOW(year,month,d);
      if(dw===0||dw===6) continue; // 일/토 건너뜀
      // dw: 0=일, 1=월, 2=화...
      if(p.e7Day !== undefined){
        // OG+E7형
        setS(wid,n,d, dw===p.e7Day ? 'E7' : 'OG', false);
      } else if(p.aDay !== undefined){
        // D1+A형
        setS(wid,n,d, dw===p.aDay ? 'A' : 'D1', false);
      } else {
        // D1 또는 OG 전담
        setS(wid,n,d, p.default || 'D1', false);
      }
    }
  });

  // ─── 토요일 배정 (정확한 격주 패턴) ───
  transport.forEach(n=>{
    const sp = satPattern?.[n];
    if(!sp) return;
    saturdays.forEach((satDay, satIdx)=>{
      if(getLocked(wid,n,satDay)) return;
      const idx = satIdx % sp.pattern.length;
      if(sp.pattern[idx] === 1){
        // 근무: shift가 'AorD1'이면 격주로 A/D1 교대, 아니면 그대로
        let s = sp.shift;
        if(s === 'AorD1'){
          // 같은 사람이 두 번 근무할 때 첫번째=A, 두번째=D1 패턴이 많음
          // 단순화: 짝수번째 근무는 A, 홀수번째는 D1
          const workOrder = sp.pattern.slice(0, idx+1).reduce((a,b)=>a+b, 0);
          s = (workOrder % 2 === 1) ? 'A' : 'D1';
        }
        setS(wid,n,satDay, s, false);
      }
    });
  });

  // ─── 일요일 강제 OFF (이미 OFF지만 확실히) ───
  transport.forEach(n=>{
    for(let d=1;d<=days;d++){
      if(getLocked(wid,n,d)) continue;
      if(DOW(year,month,d)===0){
        setS(wid,n,d,'OFF',false);
      }
    }
  });

  // ─── 이송요원 OFF=8일 강제 보정 (평일 OFF 추가) ───
  // 일요일 4~5일 + 토 격주 2~3일 = 6~8일이라 7월처럼 부족하면 평일 OFF로 채움
  // 평일은 각자 담당 요일(A/E7) 빼고 D1 또는 OG인 날에서 균등하게 OFF 추가
  const targetTransportOFF = rules.off_normal.on ? rules.off_normal.val : 8;
  
  // 각 평일별로 모든 이송요원이 동시에 OFF가 되지 않도록, 요원별 다른 평일에 OFF 배정
  transport.forEach((n, idx)=>{
    const curOFF = Array.from({length:days},(_,i)=>getS(wid,n,i+1)==='OFF'?1:0).reduce((a,b)=>a+b,0);
    let need = targetTransportOFF - curOFF;
    if(need <= 0) return;
    
    // 평일 OFF 추가: 각자 다른 요일 선호 (요원 인덱스에 따라 시작 요일 다르게)
    // 1순위: 화/수/목/금에서 자기 담당이 아닌 요일
    const wt = wkPattern?.[n] || {};
    const myDay = wt.aDay || wt.e7Day || -1;
    
    // 요원 인덱스에 따라 OFF 선호 요일 결정 (서로 안 겹치게)
    const dayOrder = [2, 4, 3, 5, 1]; // 화, 목, 수, 금, 월
    const startIdx = idx % dayOrder.length;
    const preferredDays = [];
    for(let i=0; i<dayOrder.length; i++){
      preferredDays.push(dayOrder[(startIdx + i) % dayOrder.length]);
    }
    
    // 각 선호 요일에서 OFF 추가 (월 4~5번 등장)
    for(const preferDow of preferredDays){
      if(need <= 0) break;
      if(preferDow === myDay) continue; // 담당 요일은 피함
      
      // 그 요일의 날짜들 중 OFF 가능한 것 찾기
      for(let d=1; d<=days && need>0; d++){
        if(DOW(year,month,d) !== preferDow) continue;
        if(getLocked(wid,n,d)) continue;
        if(getS(wid,n,d) === 'OFF') continue;
        setS(wid,n,d,'OFF',false);
        need--;
        break; // 같은 요일 1번만
      }
    }
    
    // 그래도 부족하면 평일 아무 곳에서나
    if(need > 0){
      for(let d=1; d<=days && need>0; d++){
        const dw = DOW(year,month,d);
        if(dw===0 || dw===6) continue;
        if(getLocked(wid,n,d)) continue;
        if(getS(wid,n,d) === 'OFF') continue;
        setS(wid,n,d,'OFF',false);
        need--;
      }
    }
  });
}

function renderPreReqScreen(){
  const el=document.getElementById('prereq-view');
  const thisMonth=preReqs.filter(p=>p.year===year&&p.month===month);
  let html=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div style="flex:1"><div style="font-size:14px;font-weight:700">${year}년 ${month}월 사전 희망 근무</div>
        <div style="font-size:11.5px;color:var(--muted);margin-top:2px">총 ${thisMonth.length}건 · 자동배정 시 🔒 잠금 적용</div>
      </div>
      <button class="btn p sm" onclick="openPreReqSheet()">+ 등록</button>
    </div>
    <div class="info-box">📌 등록된 희망 근무는 자동 배정 시 <b>잠금(🔒)</b>으로 먼저 배정됩니다.</div>
  `;
  WARDS.forEach(ward=>{
    const wardPrqs=thisMonth.filter(p=>p.wardId===ward.id);
    if(!wardPrqs.length)return;
    html+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:${ward.color};margin:12px 0 7px">${ward.name}</div>`;
    wardPrqs.forEach(p=>{
      const dw=DOW(year,month,p.day);
      const shC=p.shift==='D'||p.shift==='DE'?'var(--D-c)':p.shift==='E'||p.shift==='EN'?'var(--E-c)':p.shift==='N'?'var(--N-c)':'var(--T-c)';
      html+=`<div style="display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px">
        <div style="font-weight:700;font-size:13px;flex:1">${p.name}</div>
        <div style="font-family:'JetBrains Mono';font-size:11px;color:var(--muted)">${month}/${p.day}(${DAYS_KR[dw]})</div>
        <div style="font-family:'JetBrains Mono';font-weight:700;font-size:13px;color:${shC}">${p.shift==='OFF'?'휴':p.shift}</div>
        ${p.memo?`<div style="font-size:11px;color:var(--muted)">${p.memo}</div>`:''}
        <button class="btn sm" style="background:var(--red-d);border-color:var(--red);color:var(--red)" onclick="deletePreReq(${p.id})">✕</button>
      </div>`;
    });
  });
  if(!thisMonth.length) html+=`<div style="text-align:center;color:var(--muted);padding:28px">등록된 사전 희망 근무가 없습니다</div>`;
  el.innerHTML=html;
}

function openPreReqSheet(workerId){
  prqSelDay=null;prqSelShift=null;
  // 직원 셀렉트 (모든 병동 간병인)
  let opts='';
  WARDS.forEach(w=>{
    const{care}=getAllMembers(w.id);
    care.forEach(n=>opts+=`<option value="${w.id}|${n}">${w.name} — ${n}</option>`);
  });
  document.getElementById('prq-worker').innerHTML=opts;
  document.getElementById('prq-ym').textContent=`${year}년 ${month}월`;
  document.getElementById('prq-sel').textContent='날짜를 선택하세요';
  document.getElementById('prq-memo').value='';
  document.getElementById('prq-shift-grid').innerHTML='';
  renderPreReqCal();
  openOv('ov-prereq');
}

function renderPreReqCal(){
  const val=document.getElementById('prq-worker').value;
  if(!val)return;
  const[wid,name]=val.split('|');
  const days=dim(year,month);
  const today=new Date();
  const todayDay=today.getFullYear()===year&&today.getMonth()+1===month?today.getDate():0;
  const myPrqs=preReqs.filter(p=>p.wardId===wid&&p.name===name&&p.year===year&&p.month===month);
  const prqDays=new Set(myPrqs.map(p=>p.day));
  const firstDow=DOW(year,month,1);
  let html=`<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px">`;
  DAYS_KR.forEach((d,i)=>html+=`<div style="font-size:9.5px;font-weight:700;color:${i===0?'var(--red)':i===6?'var(--grn)':'var(--muted)'};text-align:center">${d}</div>`);
  html+=`</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;
  for(let i=0;i<firstDow;i++)html+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const dw=DOW(year,month,d);
    const hasPrq=prqDays.has(d);
    const isSel=prqSelDay===d;
    const isToday=d===todayDay;
    html+=`<div onclick="selectPreReqDay('${wid}','${name}',${d})" style="padding:5px 2px;border-radius:5px;border:1px solid ${isSel?'var(--acc)':hasPrq?'var(--acc)':'var(--border)'};background:${isSel?'var(--acc)':hasPrq?'var(--acc-d)':'var(--s1)'};cursor:pointer;text-align:center;font-size:11px;font-family:'JetBrains Mono';font-weight:600;color:${isSel?'#fff':dw===0?'var(--red)':dw===6?'var(--grn)':'var(--text)'};box-shadow:${isToday?'0 0 0 1.5px var(--acc) inset':'none'};display:flex;flex-direction:column;align-items:center;gap:1px">${d}${hasPrq?`<div style="width:5px;height:5px;border-radius:50%;background:var(--acc)"></div>`:''}</div>`;
  }
  html+=`</div>`;
  document.getElementById('prq-cal').innerHTML=html;
}

function selectPreReqDay(wid,name,d){
  prqSelDay=d;prqSelShift=null;
  const dw=DOW(year,month,d);
  const existing=preReqs.find(p=>p.wardId===wid&&p.name===name&&p.day===d&&p.year===year&&p.month===month);
  document.getElementById('prq-sel').textContent=`${month}월 ${d}일 (${DAYS_KR[dw]})${existing?' — 이미 등록됨':''} 선택됨`;
  renderPreReqCal();
  const isTransport=getWardTeams(wid)?.transport?.includes(name);
  let grid='';
  if(isTransport){
    [['D1','T'],['OG','T'],['A','T'],['E7','T']].forEach(([s,c])=>grid+=`<div class="sopt T" onclick="selectPrqShift('${s}',this)"><div class="so-l T">${s}</div><div class="so-s">${SHIFT_TIME[s]||''}</div></div>`);
  } else {
    [['D','D'],['E','E'],['N','N'],['DE','D'],['EN','E']].forEach(([s,c])=>grid+=`<div class="sopt ${c}" onclick="selectPrqShift('${s}',this)" style="${existing?.shift===s?'outline:2px solid var(--acc)':''}"><div class="so-l ${c}">${s}</div><div class="so-s">${SHIFT_TIME[s]||''}</div></div>`);
  }
  grid+=`<div class="sopt" onclick="selectPrqShift('OFF',this)" style="${existing?.shift==='OFF'?'outline:2px solid var(--acc)':''}"><div class="so-l OFF">휴</div><div class="so-s">휴무</div></div>`;
  document.getElementById('prq-shift-grid').innerHTML=grid;
  if(existing)prqSelShift=existing.shift;
}

function selectPrqShift(s,el){
  prqSelShift=s;
  document.querySelectorAll('#prq-shift-grid .sopt').forEach(e=>e.style.outline='');
  el.style.outline='2px solid var(--acc)';
}

function savePreReq(){
  if(!prqSelDay){toast('날짜를 선택하세요','err');return;}
  if(!prqSelShift){toast('희망 근무를 선택하세요','err');return;}
  const val=document.getElementById('prq-worker').value;
  const[wid,name]=val.split('|');
  const memo=document.getElementById('prq-memo').value.trim();
  // 기존 같은 날짜 삭제
  preReqs=preReqs.filter(p=>!(p.wardId===wid&&p.name===name&&p.day===prqSelDay&&p.year===year&&p.month===month));
  preReqs.push({id:preReqId++,wardId:wid,name,day:prqSelDay,shift:prqSelShift,memo,year,month,createdAt:new Date().toISOString()});
  setS(wid,name,prqSelDay,prqSelShift,true);
  saveData();
  prqSelDay=null;prqSelShift=null;
  renderPreReqCal();
  if(document.getElementById('screen-prereq').classList.contains('on'))renderPreReqScreen();
  if(document.getElementById('screen-schedule').classList.contains('on'))renderSchedule();
  toast(`${name} ${month}/${prqSelDay} → ${prqSelShift==='OFF'?'휴무':prqSelShift} 등록됨 🔒`,'ok');
}

function deletePreReq(id){
  const p=preReqs.find(x=>x.id===id);if(!p)return;
  preReqs=preReqs.filter(x=>x.id!==id);
  // 잠금 해제
  if(schedule[p.wardId]?.[K(p.name,p.day)]?.locked)
    schedule[p.wardId][K(p.name,p.day)].locked=false;
  saveData();renderPreReqScreen();renderSchedule();toast('삭제됨','warn');
}

function togRule(k){rules[k].on=!rules[k].on;saveData();renderSettings();}

async function exportWard(wid){
  if(typeof ExcelJS==='undefined'){toast('Excel 라이브러리 로딩 중...','warn');return;}
  const ward = WARDS.find(w=>w.id===wid);
  const wt = getWardTeams(wid);
  const days = dim(year, month);
  const wb = new ExcelJS.Workbook();

  // ── 스타일 정의 ──
  const COLORS = {
    leader: 'FFFFFF00',
    sat:    'FFDCE6F1',
    sun:    'FFFDE9D9',
  };

  // 테두리 helpers
  const T_THIN   = {style:'thin',   color:{argb:'FF000000'}};
  const T_MEDIUM = {style:'medium', color:{argb:'FF000000'}};
  const T_THICK  = {style:'thick',  color:{argb:'FF000000'}};

  // 전체 셀에 thin 테두리 → 외곽만 thick으로 덮어쓰기
  function applyAllBorders(ws, startRow, endRow, startCol, endCol){
    for(let r=startRow; r<=endRow; r++){
      for(let c=startCol; c<=endCol; c++){
        const cell = ws.getCell(r, c);
        const b = {
          top:    T_THIN,
          bottom: T_THIN,
          left:   T_THIN,
          right:  T_THIN,
        };
        // 외곽은 thick
        if(r === startRow) b.top = T_THICK;
        if(r === endRow)   b.bottom = T_THICK;
        if(c === startCol) b.left = T_THICK;
        if(c === endCol)   b.right = T_THICK;
        cell.border = b;
      }
    }
  }

  // ============================================================
  // SHEET 1: 전체
  // ============================================================
  function makeSheetAll(){
    const ws = wb.addWorksheet('전체');
    const TOTAL_COLS = 3 + days + 1;
    const LAST_COL = TOTAL_COLS;

    // ─── 행 1: 타이틀 ───
    ws.mergeCells(1, 1, 1, LAST_COL);
    const titleCell = ws.getCell(1, 1);
    titleCell.value = `${year}년 ${month}월  ${ward.name} 재활/병동 지원인력 근무표`;
    titleCell.font = {name:'맑은 고딕', size:20, bold:true};
    titleCell.alignment = {horizontal:'center', vertical:'center'};
    ws.getRow(1).height = 34;

    // ─── 행 2-3: 헤더 ───
    ws.mergeCells('A2:A3');
    ws.mergeCells('B2:B3');
    ws.mergeCells('C2:C3');
    ws.mergeCells(2, LAST_COL, 3, LAST_COL);

    ws.getCell('A2').value = '팀별';
    ws.getCell('B2').value = '호실';
    ws.getCell('C2').value = '근무자';
    ws.getCell(2, LAST_COL).value = '휴무\n일수';
    [ws.getCell('A2'), ws.getCell('B2'), ws.getCell('C2'), ws.getCell(2, LAST_COL)].forEach(c=>{
      c.font = {name:'맑은 고딕', size:11, bold:true};
      c.alignment = {horizontal:'center', vertical:'center', wrapText:true};
    });

    for(let d=1;d<=days;d++){
      const col = 3 + d;
      const dw = DOW(year, month, d);
      const dateCell = ws.getCell(2, col);
      const dowCell = ws.getCell(3, col);
      dateCell.value = d;
      dowCell.value = ['일','월','화','수','목','금','토'][dw];
      dateCell.font = {name:'HY그래픽', size:11, bold:true};
      dowCell.font = {name:'HY그래픽', size:11, bold:true};
      dateCell.alignment = {horizontal:'center', vertical:'center'};
      dowCell.alignment = {horizontal:'center', vertical:'center'};
      if(dw === 6){
        const fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sat}};
        dateCell.fill = fill; dowCell.fill = fill;
      } else if(dw === 0){
        const fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sun}};
        dateCell.fill = fill; dowCell.fill = fill;
      }
    }
    ws.getRow(2).height = 20;
    ws.getRow(3).height = 20;

    // ─── 본문: 간병인 ───
    let rowIdx = 4;
    const careStartRow = 4;
    wt.teams.forEach((teamData)=>{
      const teamMemberCount = teamData.jo.reduce((s,j)=>s+j.members.length, 0);
      const teamStartRow = rowIdx;

      teamData.jo.forEach((joData)=>{
        const joStartRow = rowIdx;
        const joMemberCount = joData.members.length;

        joData.members.forEach((name)=>{
          const isLeader = LEADERS.has(name);
          const offCount = Array.from({length:days},(_,i)=>getS(wid,name,i+1)==='OFF'?1:0).reduce((a,b)=>a+b,0);

          // 근무자
          const wkCell = ws.getCell(rowIdx, 3);

          wkCell.alignment = {horizontal:'center', vertical:'center'};

            wkCell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.leader}};
          }

          // 일별

            const col = 3 + d;

            const cell = ws.getCell(rowIdx, col);
            cell.value = s === 'OFF' ? '/' : s;
            cell.font = {name:'HY그래픽', size:11, bold:true};
            cell.alignment = {horizontal:'center', vertical:'center'};

              cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sat}};

              cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sun}};

          offCell.alignment = {horizontal:'center', vertical:'center'};

        });

        // 호실 셀 병합
        if(joMemberCount > 1){
          ws.mergeCells(joStartRow, 2, joStartRow + joMemberCount - 1, 2);
        }
        const roomCell = ws.getCell(joStartRow, 2);
        roomCell.value = joData.room || '';
        roomCell.font = {name:'HY그래픽', size:10, bold:true};
        roomCell.alignment = {horizontal:'center', vertical:'center', wrapText:true};
      });

      // 팀 셀 병합
      if(teamMemberCount > 1){
        ws.mergeCells(teamStartRow, 1, teamStartRow + teamMemberCount - 1, 1);
      }
      const teamCell = ws.getCell(teamStartRow, 1);
      teamCell.value = teamData.team;
      teamCell.font = {name:'맑은 고딕', size:12, bold:true};
      teamCell.alignment = {horizontal:'center', vertical:'center'};
    });

    const careEndRow = rowIdx - 1;

    // ─── 근무시간 안내 ───
    const infoRow1 = rowIdx;
    const infoRow2 = rowIdx + 1;
    ws.mergeCells(infoRow1, 1, infoRow2, 3);
    ws.mergeCells(infoRow1, 4, infoRow1, LAST_COL);
    ws.mergeCells(infoRow2, 4, infoRow2, LAST_COL);

    ws.getCell(infoRow1, 1).value = '근무시간';
    ws.getCell(infoRow1, 1).font = {name:'HY그래픽', size:12, bold:true};
    ws.getCell(infoRow1, 1).alignment = {horizontal:'center', vertical:'center'};

    ws.getCell(infoRow1, 4).value = '   D  08:00~15:00      E  15:00~22:00        N  22:00~08:00       DE  08:00~19:00      EN  19:00~08:00';
    ws.getCell(infoRow1, 4).font = {name:'HY그래픽', size:11, bold:true};
    ws.getCell(infoRow1, 4).alignment = {horizontal:'left', vertical:'center'};

    ws.getCell(infoRow2, 4).value = '  D1 08:00~17:00      A  08:00~12:30      OG  09:00~18:00       E7  12:30~17:00';
    ws.getCell(infoRow2, 4).font = {name:'HY그래픽', size:11, bold:true};
    ws.getCell(infoRow2, 4).alignment = {horizontal:'left', vertical:'center'};

    ws.getRow(infoRow1).height = 22;
    ws.getRow(infoRow2).height = 22;
    rowIdx += 2;

    // ─── 이송요원 ───
    const transportStart = rowIdx;
    if(wt.transport && wt.transport.length){
      const tCount = wt.transport.length;

      wt.transport.forEach((name)=>{
        const wkCell = ws.getCell(rowIdx, 3);
        wkCell.value = name;
        wkCell.font = {name:'HY그래픽', size:11, bold:true};
        wkCell.alignment = {horizontal:'center', vertical:'center'};

        let off = 0;
        for(let d=1;d<=days;d++){
          const col = 3 + d;
          const s = getS(wid, name, d);
          if(s === 'OFF') off++;
          const cell = ws.getCell(rowIdx, col);
          cell.value = s === 'OFF' ? '/' : s;
          cell.font = {name:'HY그래픽', size:11, bold:true};
          cell.alignment = {horizontal:'center', vertical:'center'};
          const dw = DOW(year, month, d);
          if(dw === 6){
            cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sat}};
          } else if(dw === 0){
            cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sun}};
          }
        }
        const offCell = ws.getCell(rowIdx, LAST_COL);
        offCell.value = off;
        offCell.font = {name:'HY그래픽', size:11, bold:true};
        offCell.alignment = {horizontal:'center', vertical:'center'};
        rowIdx++;
      });

      ws.mergeCells(transportStart, 1, transportStart + tCount - 1, 2);
      const tCell = ws.getCell(transportStart, 1);
      tCell.value = '이송요원';
      tCell.font = {name:'HY그래픽', size:14, bold:true};
      tCell.alignment = {horizontal:'center', vertical:'center', wrapText:true};
    }
    const transportEnd = rowIdx - 1;

    // ─── 행 높이 ───
    for(let r=4; r<rowIdx; r++){
      if(!ws.getRow(r).height) ws.getRow(r).height = 20;
    }

    // ─── 열 너비 ───
    ws.getColumn(1).width = 6;
    ws.getColumn(2).width = 14;
    ws.getColumn(3).width = 9;
    for(let d=1;d<=days;d++) ws.getColumn(3+d).width = 4;
    ws.getColumn(LAST_COL).width = 5;

    // ─── 테두리 적용 (전체 표 일괄) ───
    applyAllBorders(ws, 1, rowIdx-1, 1, LAST_COL);
  }

  // ============================================================
  // SHEET 2: 병실 (간병만 + 근무수칙)
  // ============================================================
  function makeSheetRoom(){
    const ws = wb.addWorksheet('병실');
    const TOTAL_COLS = 3 + days + 1;
    const LAST_COL = TOTAL_COLS;

    ws.mergeCells(1, 1, 1, LAST_COL);
    const titleCell = ws.getCell(1, 1);
    titleCell.value = `${year}년 ${month}월  ${ward.name} 재활/병동 지원인력 근무표`;
    titleCell.font = {name:'맑은 고딕', size:20, bold:true};
    titleCell.alignment = {horizontal:'center', vertical:'center'};
    ws.getRow(1).height = 34;

    ws.mergeCells('A2:A3');
    ws.mergeCells('B2:B3');
    ws.mergeCells('C2:C3');
    ws.mergeCells(2, LAST_COL, 3, LAST_COL);

    ws.getCell('A2').value = '팀별';
    ws.getCell('B2').value = '호실';
    ws.getCell('C2').value = '근무자';
    ws.getCell(2, LAST_COL).value = '휴무\n일수';
    [ws.getCell('A2'), ws.getCell('B2'), ws.getCell('C2'), ws.getCell(2, LAST_COL)].forEach(c=>{
      c.font = {name:'HY그래픽', size:12, bold:true};
      c.alignment = {horizontal:'center', vertical:'center', wrapText:true};
    });

    for(let d=1;d<=days;d++){
      const col = 3 + d;
      const dw = DOW(year, month, d);
      const dateCell = ws.getCell(2, col);
      const dowCell = ws.getCell(3, col);
      dateCell.value = d;
      dowCell.value = ['일','월','화','수','목','금','토'][dw];
      dateCell.font = {name:'HY그래픽', size:12, bold:true};
      dowCell.font = {name:'HY그래픽', size:12, bold:true};
      dateCell.alignment = {horizontal:'center', vertical:'center'};
      dowCell.alignment = {horizontal:'center', vertical:'center'};
      if(dw === 6){
        const fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sat}};
        dateCell.fill = fill; dowCell.fill = fill;
      } else if(dw === 0){
        const fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sun}};
        dateCell.fill = fill; dowCell.fill = fill;
      }
    }
    ws.getRow(2).height = 23;
    ws.getRow(3).height = 23;

    let rowIdx = 4;
    wt.teams.forEach((teamData)=>{
      const teamMemberCount = teamData.jo.reduce((s,j)=>s+j.members.length, 0);
      const teamStartRow = rowIdx;

      teamData.jo.forEach((joData)=>{
        const joStartRow = rowIdx;
        const joMemberCount = joData.members.length;

        joData.members.forEach((name)=>{
          const isLeader = LEADERS.has(name);
          const offCount = Array.from({length:days},(_,i)=>getS(wid,name,i+1)==='OFF'?1:0).reduce((a,b)=>a+b,0);

          const wkCell = ws.getCell(rowIdx, 3);
          wkCell.value = name;
          wkCell.font = {name:'HY그래픽', size:12, bold:true};
          wkCell.alignment = {horizontal:'center', vertical:'center'};
          if(isLeader){
            wkCell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.leader}};
          }

          for(let d=1;d<=days;d++){
            const col = 3 + d;
            const s = getS(wid, name, d);
            const cell = ws.getCell(rowIdx, col);
            cell.value = s === 'OFF' ? '/' : s;
            cell.font = {name:'HY그래픽', size:12, bold:true};
            cell.alignment = {horizontal:'center', vertical:'center'};
            const dw = DOW(year, month, d);
            if(dw === 6){
              cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sat}};
            } else if(dw === 0){
              cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sun}};
            }
          }

          const offCell = ws.getCell(rowIdx, LAST_COL);
          offCell.value = offCount;
          offCell.font = {name:'HY그래픽', size:11, bold:true};
          offCell.alignment = {horizontal:'center', vertical:'center'};

          rowIdx++;
        });

        if(joMemberCount > 1){
          ws.mergeCells(joStartRow, 2, joStartRow + joMemberCount - 1, 2);
        }
        const roomCell = ws.getCell(joStartRow, 2);
        roomCell.value = joData.room || '';
        roomCell.font = {name:'HY그래픽', size:11, bold:true};
        roomCell.alignment = {horizontal:'center', vertical:'center', wrapText:true};
      });

      if(teamMemberCount > 1){
        ws.mergeCells(teamStartRow, 1, teamStartRow + teamMemberCount - 1, 1);
      }
      const teamCell = ws.getCell(teamStartRow, 1);
      teamCell.value = teamData.team;
      teamCell.font = {name:'HY그래픽', size:14, bold:true};
      teamCell.alignment = {horizontal:'center', vertical:'center'};
    });

    // 근무시간 안내
    const infoRow = rowIdx;
    ws.mergeCells(infoRow, 1, infoRow + 1, 3);
    ws.mergeCells(infoRow, 4, infoRow + 1, LAST_COL);

    ws.getCell(infoRow, 1).value = '근무시간';
    ws.getCell(infoRow, 1).font = {name:'HY그래픽', size:12, bold:true};
    ws.getCell(infoRow, 1).alignment = {horizontal:'center', vertical:'center'};

    ws.getCell(infoRow, 4).value = '  D  08:00~15:00    E  15:00~22:00    N  22:00~08:00    DE  08:00~19:00    EN  19:00~08:00\n  D1 08:00~17:00    A  08:00~12:30    OG  09:00~18:00    E7  12:30~17:00';
    ws.getCell(infoRow, 4).font = {name:'HY그래픽', size:12, bold:true};
    ws.getCell(infoRow, 4).alignment = {horizontal:'left', vertical:'center', wrapText:true};

    ws.getRow(infoRow).height = 25;
    ws.getRow(infoRow+1).height = 25;
    rowIdx += 2;

    // 근무수칙
    const ruleRow = rowIdx;
    ws.mergeCells(ruleRow, 1, ruleRow, 3);
    ws.mergeCells(ruleRow, 4, ruleRow, LAST_COL);

    ws.getCell(ruleRow, 1).value = '근무수칙';
    ws.getCell(ruleRow, 1).font = {name:'HY그래픽', size:12, bold:true};
    ws.getCell(ruleRow, 1).alignment = {horizontal:'center', vertical:'center'};

    ws.getCell(ruleRow, 4).value = ' 1. 근무 종료 전 다음 근무자에게 정확하게 인계한다.\n 2. 당일 팀 명단 위쪽에 위치한 근무자는 1조 병실을, 아래쪽에 위치한 근무자는 2조 병실을 담당한다.\n 3. EN, N 다음날은 휴무를 원칙으로 한다.\n 4. 휴무는 팀장을 제외하고 월 8개로 동일하게 배정한다.\n 5. DE, EN은 월 평균 횟수로 근무자들에게 동일하게 배정한다.';
    ws.getCell(ruleRow, 4).font = {name:'HY그래픽', size:11, bold:true};
    ws.getCell(ruleRow, 4).alignment = {horizontal:'left', vertical:'center', wrapText:true};

    ws.getRow(ruleRow).height = 100;
    rowIdx++;

    // 행 높이
    for(let r=4; r<infoRow; r++){
      if(!ws.getRow(r).height) ws.getRow(r).height = 23;
    }

    // 열 너비
    ws.getColumn(1).width = 6;
    ws.getColumn(2).width = 16;
    ws.getColumn(3).width = 9;
    for(let d=1;d<=days;d++) ws.getColumn(3+d).width = 4;
    ws.getColumn(LAST_COL).width = 5;

    // 테두리 일괄 적용
    applyAllBorders(ws, 1, rowIdx-1, 1, LAST_COL);
  }

  // ============================================================
  // SHEET 3: 이송
  // ============================================================
  function makeSheetTransport(){
    const ws = wb.addWorksheet('이송');
    const TOTAL_COLS = 2 + days;

    ws.mergeCells(1, 1, 1, TOTAL_COLS);
    const titleCell = ws.getCell(1, 1);
    titleCell.value = `${year}년 ${month}월  ${ward.name} 재활/병동 지원인력 근무표`;
    titleCell.font = {name:'맑은 고딕', size:20, bold:true};
    titleCell.alignment = {horizontal:'center', vertical:'center'};
    ws.getRow(1).height = 34;

    ws.mergeCells('A2:A3');
    ws.mergeCells('B2:B3');

    ws.getCell('A2').value = '업무별';
    ws.getCell('B2').value = '근무자';
    [ws.getCell('A2'), ws.getCell('B2')].forEach(c=>{
      c.font = {name:'HY그래픽', size:12, bold:true};
      c.alignment = {horizontal:'center', vertical:'center'};
    });

    for(let d=1;d<=days;d++){
      const col = 2 + d;
      const dw = DOW(year, month, d);
      const dateCell = ws.getCell(2, col);
      const dowCell = ws.getCell(3, col);
      dateCell.value = d;
      dowCell.value = ['일','월','화','수','목','금','토'][dw];
      dateCell.font = {name:'HY그래픽', size:12, bold:true};
      dowCell.font = {name:'HY그래픽', size:12, bold:true};
      dateCell.alignment = {horizontal:'center', vertical:'center'};
      dowCell.alignment = {horizontal:'center', vertical:'center'};
      if(dw === 6){
        const fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sat}};
        dateCell.fill = fill; dowCell.fill = fill;
      } else if(dw === 0){
        const fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sun}};
        dateCell.fill = fill; dowCell.fill = fill;
      }
    }
    ws.getRow(2).height = 30;
    ws.getRow(3).height = 30;

    const tStart = 4;
    const transport = wt.transport || [];
    transport.forEach((name, idx)=>{
      const r = tStart + idx;
      ws.getRow(r).height = 30;

      const wkCell = ws.getCell(r, 2);
      wkCell.value = name;
      wkCell.font = {name:'HY그래픽', size:12, bold:true};
      wkCell.alignment = {horizontal:'center', vertical:'center'};

      for(let d=1;d<=days;d++){
        const col = 2 + d;
        const s = getS(wid, name, d);
        const cell = ws.getCell(r, col);
        cell.value = s === 'OFF' ? '/' : s;
        cell.font = {name:'HY그래픽', size:12, bold:true};
        cell.alignment = {horizontal:'center', vertical:'center'};
        const dw = DOW(year, month, d);
        if(dw === 6){
          cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sat}};
        } else if(dw === 0){
          cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:COLORS.sun}};
        }
      }
    });

    if(transport.length){
      ws.mergeCells(tStart, 1, tStart + transport.length - 1, 1);
      const tCell = ws.getCell(tStart, 1);
      tCell.value = '이송요원';
      tCell.font = {name:'HY그래픽', size:14, bold:true};
      tCell.alignment = {horizontal:'center', vertical:'center', wrapText:true};
    }

    const infoR = tStart + transport.length;
    ws.mergeCells(infoR, 1, infoR + 1, 2);
    ws.mergeCells(infoR, 3, infoR + 1, TOTAL_COLS);

    ws.getCell(infoR, 1).value = '근무시간';
    ws.getCell(infoR, 1).font = {name:'HY그래픽', size:12, bold:true};
    ws.getCell(infoR, 1).alignment = {horizontal:'center', vertical:'center'};

    ws.getCell(infoR, 3).value = '   D1 08:00~17:00      A  08:00~12:30      OG  09:00~18:00       E7  12:30~17:00';
    ws.getCell(infoR, 3).font = {name:'HY그래픽', size:12, bold:true};
    ws.getCell(infoR, 3).alignment = {horizontal:'left', vertical:'center'};

    ws.getRow(infoR).height = 20;
    ws.getRow(infoR+1).height = 20;

    ws.getColumn(1).width = 13;
    ws.getColumn(2).width = 9;
    for(let d=1;d<=days;d++) ws.getColumn(2+d).width = 4;

    // 테두리 일괄 적용
    applyAllBorders(ws, 1, infoR+1, 1, TOTAL_COLS);
  }

  makeSheetAll();
  makeSheetRoom();
  makeSheetTransport();

  const buffer = await wb.xlsx.writeBuffer();
  const blob = new Blob([buffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  saveAs(blob, `${year}년 ${month}월 보건대병원 ${ward.name} 지원인력 근무표.xlsx`);
  toast(`${ward.name} Excel 저장됨`,'ok');
}

function exportJSON(){
  const data={schedule,preReqs,preReqId,rules,year,month};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`careshift_backup_${year}_${month}.json`;a.click();
  toast('백업 완료','ok');
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.schedule)schedule=d.schedule;
      if(d.preReqs)preReqs=d.preReqs;
      if(d.preReqId)preReqId=d.preReqId;
      if(d.rules)Object.keys(d.rules).forEach(k=>{if(rules[k])rules[k]=d.rules[k];});
      saveData();renderSchedule();toast('복원 완료','ok');
    }catch{toast('파일 오류','err');}
  };r.readAsText(f);
}

function openOv(id){document.getElementById(id).classList.add('on');}
function closeOv(id,e){if(e&&e.target!==document.getElementById(id))return;document.getElementById(id).classList.remove('on');}
let toastT;
function toast(msg,type=''){
  const el=document.getElementById('toast-el');
  el.textContent=msg;el.className=`toast ${type} on`;
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2600);
}
function checkMobile(){
  const mob=window.innerWidth<860;
  document.getElementById('tb-logo').style.display=mob?'block':'none';
}
window.addEventListener('resize',checkMobile);
document.getElementById('l-pin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
